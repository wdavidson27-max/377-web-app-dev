<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eight-Seat Poker Table</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="table-scene">
      <section class="table-wrap" aria-label="Poker table">
        <div class="table-surface">
          <div class="table-rim"></div>

          <div class="seat seat-1">
            <span class="seat-tag">Seat 1</span>
            <strong>Player 1</strong>
          </div>
          <div class="seat seat-2">
            <span class="seat-tag">Seat 2</span>
            <strong>Player 2</strong>
          </div>
          <div class="seat seat-3">
            <span class="seat-tag">Seat 3</span>
            <strong>Player 3</strong>
          </div>
          <div class="seat seat-4">
            <span class="seat-tag">Seat 4</span>
            <strong>Player 4</strong>
          </div>
          <div class="seat seat-5">
            <span class="seat-tag">Seat 5</span>
            <strong>Player 5</strong>
          </div>
          <div class="seat seat-6">
            <span class="seat-tag">Seat 6</span>
            <strong>Player 6</strong>
          </div>
          <div class="seat seat-7">
            <span class="seat-tag">Seat 7</span>
            <strong>Player 7</strong>
          </div>
          <div class="seat seat-8">
            <span class="seat-tag">Seat 8</span>
            <strong>Player 8</strong>
          </div>

          <div class="deck-stack" aria-label="Face-down 52 card deck">
            <div class="deck-card">
              <div class="deck-back-ornament deck-back-corner top-left"></div>
              <div class="deck-back-ornament deck-back-corner top-right"></div>
              <div class="deck-back-ornament deck-back-corner bottom-left"></div>
              <div class="deck-back-ornament deck-back-corner bottom-right"></div>
              <div class="deck-back-center"></div>
            </div>
          </div>

          <div class="dealer-chip" aria-label="Dealer button">D</div>
        </div>
      </section>
    </main>
  </body>
</html>
